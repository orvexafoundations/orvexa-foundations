<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Orvexa Press - Kirim Tulisan</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>/* sama seperti style global */ *{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#F5F5F0;color:#0A0A0A;}:root{--black:#0A0A0A;--navy:#1A1A2E;--gold:#C8A96E;--cream:#F5F5F0;--gray:#6B6B6B;--border:#D4D4CC;--white:#FFFFFF;}.container{max-width:900px;margin:40px auto;background:white;padding:40px;box-shadow:0 0 20px rgba(0,0,0,0.05);}.form-group{margin-bottom:20px;}label{font-size:12px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px;color:var(--gray);}input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);font-family:'Inter';background:var(--cream);}button{background:var(--navy);color:var(--gold);border:none;padding:12px 28px;font-weight:700;cursor:pointer;}.image-preview{margin-top:10px;max-width:300px;display:none;}.image-preview img{width:100%;}.toast{position:fixed;bottom:20px;right:20px;background:#1A1A2E;color:white;padding:12px 20px;border-left:4px solid var(--gold);display:none;}</style></head>
<body><div class="container"><h1 style="font-family:'Playfair Display';margin-bottom:20px;">Kirim Naskah ke Redaksi</h1><p style="margin-bottom:30px;color:gray">Tulisan Anda akan melewati proses kurasi oleh admin. Pastikan orisinal dan faktual.</p><form id="submitForm"><div class="form-group"><label>Judul</label><input type="text" id="title" required></div><div class="form-group"><label>Kategori</label><select id="category"><option>Ekonomi</option><option>Politik</option><option>Sejarah</option><option>Artikel</option><option>Essai</option><option>Opini</option></select></div><div class="form-group"><label>Penulis (Nama Lengkap)</label><input type="text" id="author" placeholder="Nama asli atau pseudonim"></div><div class="form-group"><label>Ringkasan (Excerpt)</label><textarea id="excerpt" rows="3"></textarea></div><div class="form-group"><label>Isi Artikel</label><textarea id="content" rows="10" required></textarea></div><div class="form-group"><label>Upload Gambar (opsional)</label><input type="file" id="imageFile" accept="image/*"><div class="image-preview" id="previewBox"><img id="previewImg"><p style="font-size:11px">Preview</p></div></div><button type="submit">Kirim ke Redaksi</button></form></div><div id="toast" class="toast"></div><script>const SUPABASE_URL='https://jfgjerwohnenqgpqzkxb.supabase.co',SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ2plcndvaG5lbnFncHF6a3hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjI5NzMsImV4cCI6MjA5NjU5ODk3M30.p-q3PuYVBP2lS2bVE2awynYR6aCCZ-Bish0LSyYSnZE',sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);document.getElementById('imageFile').addEventListener('change',function(e){const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=function(ev){document.getElementById('previewImg').src=ev.target.result;document.getElementById('previewBox').style.display='block';};reader.readAsDataURL(file);}});document.getElementById('submitForm').addEventListener('submit',async(e)=>{e.preventDefault();const title=document.getElementById('title').value,cat=document.getElementById('category').value,author=document.getElementById('author').value,excerpt=document.getElementById('excerpt').value,content=document.getElementById('content').value;if(!title||!content){showToast('Judul dan konten wajib diisi','error');return;}let imageUrl=null;const file=document.getElementById('imageFile').files[0];if(file){const ext=file.name.split('.').pop();const fileName=`submissions/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;const{data,error}=await sb.storage.from('media').upload(fileName,file);if(error){showToast('Gagal upload gambar: '+error.message,'error');return;}const{data:urlData}=sb.storage.from('media').getPublicUrl(fileName);imageUrl=urlData.publicUrl;}const{error}=await sb.from('articles').insert({title:title,category:cat,author:author||'Anonim',excerpt:excerpt,content:content,image_url:imageUrl,published:false,rejected:false,created_at:new Date().toISOString()});if(error){showToast('Gagal mengirim: '+error.message,'error');}else{showToast('Naskah terkirim! Menunggu persetujuan admin.','success');document.getElementById('submitForm').reset();document.getElementById('previewBox').style.display='none';}});function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',4000);}</script></body></html>
