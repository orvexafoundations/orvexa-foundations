<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Orvexa Press - Kirim Tulisan</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#F5F5F0;color:#0A0A0A;}:root{--black:#0A0A0A;--navy:#1A1A2E;--gold:#C8A96E;--cream:#F5F5F0;--gray:#6B6B6B;--border:#D4D4CC;--white:#FFFFFF;}.container{max-width:900px;margin:40px auto;background:white;padding:40px;box-shadow:0 0 20px rgba(0,0,0,0.05);}.form-group{margin-bottom:20px;}label{font-size:12px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px;color:var(--gray);}input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);font-family:'Inter';background:var(--cream);}button{background:var(--navy);color:var(--gold);border:none;padding:12px 28px;font-weight:700;cursor:pointer;transition:0.2s;}button:hover{background:var(--gold);color:var(--navy);}.image-preview{margin-top:10px;max-width:300px;display:none;}.image-preview img{width:100%;}.toast{position:fixed;bottom:20px;right:20px;background:#1A1A2E;color:white;padding:12px 20px;border-left:4px solid var(--gold);display:none;z-index:1000;font-size:14px;}.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;display:none;}.spinner{width:50px;height:50px;border:5px solid #ddd;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}</style></head>
<body><div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div><div class="container"><h1 style="font-family:'Playfair Display';margin-bottom:20px;">Kirim Naskah ke Redaksi</h1><p style="margin-bottom:30px;color:gray">Tulisan Anda akan melewati proses kurasi oleh admin. Pastikan orisinal dan faktual.</p><form id="submitForm"><div class="form-group"><label>Judul</label><input type="text" id="title" required></div><div class="form-group"><label>Kategori</label><select id="category"><option>Ekonomi</option><option>Politik</option><option>Sejarah</option><option>Artikel</option><option>Essai</option><option>Opini</option><option>hukum</option><option>olahraga</option><option>internasional</option></select></div><div class="form-group"><label>Penulis (Nama Lengkap)</label><input type="text" id="author" placeholder="Nama asli atau pseudonim"></div><div class="form-group"><label>Ringkasan (Excerpt)</label><textarea id="excerpt" rows="3"></textarea></div><div class="form-group"><label>Isi Artikel</label><textarea id="content" rows="10" required></textarea></div><div class="form-group"><label>Upload Gambar (opsional)</label><input type="file" id="imageFile" accept="image/*"><div class="image-preview" id="previewBox"><img id="previewImg"><p style="font-size:11px">Preview</p></div></div><button type="submit">Kirim ke Redaksi</button></form></div><div id="toast" class="toast"></div><script>const SUPABASE_URL='https://eflqmksprpcjcxgtsgjt.supabase.co',SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbHFta3NwcnBjamN4Z3RzZ2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTc1OTAsImV4cCI6MjA5NjU5MzU5MH0.TCqOzZPknF8KsTahB6rfph8_J2cZAGUNi3AHeLX2xFw',sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);function showToast(msg,isError=false){const t=document.getElementById('toast');t.textContent=msg;t.style.backgroundColor=isError?'#B91C1C':'#1A1A2E';t.style.borderLeftColor=isError?'#FFD700':'#C8A96E';t.style.display='block';setTimeout(()=>t.style.display='none',5000);}function showLoading(show){document.getElementById('loadingOverlay').style.display=show?'flex':'none';}document.getElementById('imageFile').addEventListener('change',function(e){const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=function(ev){document.getElementById('previewImg').src=ev.target.result;document.getElementById('previewBox').style.display='block';};reader.readAsDataURL(file);}});document.getElementById('submitForm').addEventListener('submit',async(e)=>{e.preventDefault();showLoading(true);const title=document.getElementById('title').value.trim(),cat=document.getElementById('category').value,author=document.getElementById('author').value.trim()||'Anonim',excerpt=document.getElementById('excerpt').value.trim(),content=document.getElementById('content').value.trim();if(!title||!content){showToast('Judul dan konten wajib diisi',true);showLoading(false);return;}let imageUrl=null;const file=document.getElementById('imageFile').files[0];if(file){if(file.size>5*1024*1024){showToast('Ukuran gambar maksimal 5MB',true);showLoading(false);return;}const ext=file.name.split('.').pop().toLowerCase();if(!['jpg','jpeg','png','webp','gif'].includes(ext)){showToast('Format gambar tidak didukung (JPG, PNG, WEBP, GIF)',true);showLoading(false);return;}const fileName=`submissions/${Date.now()}_${Math.random().toString(36).substring(2,10)}.${ext}`;try{const{data:uploadData,error:uploadError}=await sb.storage.from('media').upload(fileName,file);if(uploadError){console.error('Upload error:',uploadError);showToast('Gagal upload gambar: '+uploadError.message,true);showLoading(false);return;}const{data:urlData}=sb.storage.from('media').getPublicUrl(fileName);imageUrl=urlData.publicUrl;}catch(err){console.error(err);showToast('Error upload: '+err.message,true);showLoading(false);return;}}const newArticle={title:title,category:cat,author:author,excerpt:excerpt,content:content,image_url:imageUrl,published:false,rejected:false,created_at:new Date().toISOString()};try{const{data,error:insertError}=await sb.from('articles').insert(newArticle).select();if(insertError){console.error('Insert error:',insertError);showToast('Gagal menyimpan artikel: '+insertError.message,true);showLoading(false);return;}showToast('Naskah terkirim! Terima kasih, naskah akan dikurasi admin.',false);document.getElementById('submitForm').reset();document.getElementById('previewBox').style.display='none';}catch(err){console.error(err);showToast('Terjadi kesalahan: '+err.message,true);}finally{showLoading(false);}});</script></body></html>
