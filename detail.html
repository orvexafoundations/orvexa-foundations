<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Orvexa Press - Detail Artikel</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#F5F5F0;color:#0A0A0A;}:root{--black:#0A0A0A;--navy:#1A1A2E;--gold:#C8A96E;--cream:#F5F5F0;--gray:#6B6B6B;--border:#D4D4CC;--white:#FFFFFF;--red:#B91C1C;}.container{max-width:800px;margin:40px auto;padding:20px;background:white;box-shadow:0 0 20px rgba(0,0,0,0.05);}.article-cat{font-size:12px;color:var(--red);text-transform:uppercase;letter-spacing:2px;font-weight:700;}.article-title{font-family:'Playfair Display',serif;font-size:42px;margin:15px 0;}.article-meta{color:gray;font-size:13px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;margin:20px 0;}.article-img{width:100%;max-height:500px;object-fit:cover;margin:20px 0;}.article-body{font-size:18px;line-height:1.8;}.article-body p{margin-bottom:1.2em;}.back-btn{background:var(--navy);color:var(--gold);border:none;padding:10px 24px;cursor:pointer;margin-bottom:20px;font-weight:600;}.back-btn:hover{background:var(--gold);color:var(--navy);}footer{background:var(--navy);color:var(--cream);padding:30px;text-align:center;margin-top:50px;}</style></head>
<body><div style="padding:20px;"><button class="back-btn" onclick="window.history.back()">← Kembali</button></div><div class="container" id="detailContainer"><div class="loading">Memuat artikel...</div></div><footer><div class="copyright">© 2025 Orvexa Press - Media Independen</div></footer><script>const detail=JSON.parse(localStorage.getItem('orvexa_article_detail'));if(detail){document.getElementById('detailContainer').innerHTML=`<div class="article-cat">${detail.category||''}</div><h1 class="article-title">${detail.title}</h1><div class="article-meta">Oleh ${detail.author||'Redaksi'} • ${new Date(detail.created_at).toLocaleDateString('id-ID')}</div>${detail.image_url?`<img class="article-img" src="${detail.image_url}" alt="${detail.title}">`:''}<div class="article-body">${(detail.content||'').split('\n').filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join('')}</div>`;}else{document.getElementById('detailContainer').innerHTML='<div style="padding:50px;text-align:center">Artikel tidak ditemukan.</div>';}</script></body></html>
