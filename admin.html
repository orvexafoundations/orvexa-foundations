<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Orvexa Press - Admin Panel</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#F0F0EA;}#loginScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1A1A2E;display:flex;align-items:center;justify-content:center;z-index:999;}.login-box{background:white;padding:40px;width:350px;text-align:center;border-top:5px solid #C8A96E;}#adminApp{display:none;}.admin-header{background:#1A1A2E;color:white;display:flex;justify-content:space-between;padding:12px 30px;}.sidebar{width:260px;background:white;border-right:1px solid #ddd;padding:20px;}.admin-body{display:flex;}.content{flex:1;padding:30px;}.table{width:100%;border-collapse:collapse;background:white;}.table th,.table td{padding:12px;border-bottom:1px solid #ddd;text-align:left;}.badge{padding:4px 8px;font-size:11px;font-weight:bold;}.badge-pending{background:#FEF3C7;color:#B45309;}.badge-published{background:#DCFCE7;color:#15803D;}.badge-rejected{background:#FEE2E2;color:#B91C1C;}.btn-sm{padding:5px 10px;font-size:11px;margin:2px;cursor:pointer;border:none;}.filter-bar{margin-bottom:20px;}</style></head>
<body><div id="loginScreen"><div class="login-box"><h2>🔐 Admin Orvexa</h2><input type="password" id="adminPass" placeholder="Password" style="width:100%;padding:10px;margin:15px 0"><button id="loginBtn" style="background:#1A1A2E;color:#C8A96E;padding:10px;width:100%;border:none;">Masuk</button><div id="loginError" style="color:red;margin-top:10px"></div></div></div><div id="adminApp"><div class="admin-header"><div><strong>ORVEXA PRESS</strong> - Panel Admin</div><button id="logoutBtn" style="background:none;border:1px solid gold;color:gold;padding:5px 12px;">Logout</button></div><div class="admin-body"><div class="sidebar"><h4>Menu</h4><button onclick="loadArticles('all')" class="btn-sm">Semua Artikel</button><button onclick="loadArticles('pending')" class="btn-sm">Pending</button><button onclick="loadArticles('published')" class="btn-sm">Published</button><button onclick="loadArticles('rejected')" class="btn-sm">Rejected</button><hr><button onclick="showWriteForm()" class="btn-sm" style="background:gold;">+ Tulis Langsung</button></div><div class="content"><div id="writeSection" style="display:none; background:white; padding:20px; margin-bottom:20px;"><h3>Tulis / Edit Artikel</h3><input type="hidden" id="editId"><input type="text" id="adminTitle" placeholder="Judul" style="width:100%;margin-bottom:10px;padding:8px;"><select id="adminCategory" style="width:100%;margin-bottom:10px;padding:8px;"><option>Ekonomi</option><option>Politik</option><option>Sejarah</option><option>Artikel</option><option>Essai</option><option>Opini</option></select><textarea id="adminContent" rows="6" placeholder="Isi artikel..." style="width:100%;margin-bottom:10px;"></textarea><input type="text" id="adminImage" placeholder="URL Gambar"><button id="saveAdminBtn" class="btn-sm" style="background:green;color:white;">Simpan & Publish</button><button onclick="hideWriteForm()" class="btn-sm">Batal</button></div><div class="filter-bar"><h3>Daftar Artikel</h3></div><table class="table"><thead><tr><th>Judul</th><th>Kategori</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="adminTableBody"><tr><td colspan="4">Memuat...</td></tr></tbody></table></div></div></div><script>const CORRECT_PASS="Rezadk_77",SUPABASE_URL='https://eflqmksprpcjcxgtsgjt.supabase.co',SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbHFta3NwcnBjamN4Z3RzZ2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTc1OTAsImV4cCI6MjA5NjU5MzU5MH0.TCqOzZPknF8KsTahB6rfph8_J2cZAGUNi3AHeLX2xFw',sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);function checkSession(){if(sessionStorage.getItem('adminLogged')==='true'){document.getElementById('loginScreen').style.display='none';document.getElementById('adminApp').style.display='block';loadArticles('all');return true;}return false;}document.getElementById('loginBtn').onclick=()=>{const pwd=document.getElementById('adminPass').value;if(pwd===CORRECT_PASS){sessionStorage.setItem('adminLogged','true');checkSession();}else{document.getElementById('loginError').innerText='Password salah!';}};document.getElementById('logoutBtn').onclick=()=>{sessionStorage.removeItem('adminLogged');location.reload();};if(!checkSession())document.getElementById('loginScreen').style.display='flex';async function loadArticles(filter){let query=sb.from('articles').select('*').order('created_at',{ascending:false});let data;if(filter==='pending')data=await query.eq('published',false).eq('rejected',false);else if(filter==='published')data=await query.eq('published',true).eq('rejected',false);else if(filter==='rejected')data=await query.eq('rejected',true);else data=await query;const articles=data.data||[];const tbody=document.getElementById('adminTableBody');if(!articles.length){tbody.innerHTML='<tr><td colspan="4">Tidak ada artikel</td></tr>';return;}tbody.innerHTML=articles.map(a=>`<tr><td>${a.title}</td><td>${a.category}</td><td>${a.published?'<span class="badge badge-published">Published</span>':a.rejected?'<span class="badge badge-rejected">Rejected</span>':'<span class="badge badge-pending">Pending</span>'}</td><td><button class="btn-sm" onclick='editArticle(${JSON.stringify(a).replace(/'/g,"&#39;")})'>Edit</button>${!a.published&&!a.rejected?`<button class="btn-sm" onclick="publishArticle('${a.id}')">Publish</button><button class="btn-sm" onclick="rejectArticle('${a.id}')">Reject</button>`:''}${a.published?`<button class="btn-sm" onclick="unpublishArticle('${a.id}')">Unpublish</button>`:''}<button class="btn-sm" onclick="deleteArticle('${a.id}')">Hapus</button></td></tr>`).join('');}window.publishArticle=async(id)=>{await sb.from('articles').update({published:true,rejected:false}).eq('id',id);loadArticles('all');};window.rejectArticle=async(id)=>{await sb.from('articles').update({published:false,rejected:true}).eq('id',id);loadArticles('all');};window.unpublishArticle=async(id)=>{await sb.from('articles').update({published:false,rejected:false}).eq('id',id);loadArticles('all');};window.deleteArticle=async(id)=>{if(confirm('Hapus permanen?')){await sb.from('articles').delete().eq('id',id);loadArticles('all');}};function showWriteForm(){document.getElementById('writeSection').style.display='block';}function hideWriteForm(){document.getElementById('writeSection').style.display='none';document.getElementById('editId').value='';document.getElementById('adminTitle').value='';document.getElementById('adminContent').value='';}window.editArticle=(a)=>{document.getElementById('editId').value=a.id;document.getElementById('adminTitle').value=a.title;document.getElementById('adminCategory').value=a.category;document.getElementById('adminContent').value=a.content;document.getElementById('adminImage').value=a.image_url||'';showWriteForm();};document.getElementById('saveAdminBtn').onclick=async()=>{const id=document.getElementById('editId').value;const data={title:document.getElementById('adminTitle').value,category:document.getElementById('adminCategory').value,content:document.getElementById('adminContent').value,image_url:document.getElementById('adminImage').value,published:true,rejected:false,updated_at:new Date().toISOString()};if(id)await sb.from('articles').update(data).eq('id',id);else{data.created_at=new Date().toISOString();data.author='Admin Orvexa';await sb.from('articles').insert(data);}hideWriteForm();loadArticles('all');};</script></body></html>
